version: '3.8'

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=intzam_lms
      - POSTGRES_USER=intzam_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intzam_user -d intzam_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API (Django) ───────────────────────────────────────────────────
  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - media_files:/app/media
    env_file:
      - ./backend/.env.production
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # ── Website CMS (Django) ───────────────────────────────────────────────────
  website:
    build: ./website
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn web_project.wsgi:application --bind 0.0.0.0:8001 --workers 2 --timeout 120"
    env_file:
      - ./website/.env.production
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # ── Admin Frontend (React build) ───────────────────────────────────────────
  admin-frontend:
    build:
      context: ./admin-frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    volumes:
      - admin_dist:/app/dist
    restart: "no"

  # ── Client PWA (React build) ───────────────────────────────────────────────
  client-pwa:
    build:
      context: ./client-pwa
      args:
        - VITE_API_URL=${VITE_API_URL}
    volumes:
      - client_dist:/app/dist
    restart: "no"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - admin_dist:/usr/share/nginx/admin:ro
      - client_dist:/usr/share/nginx/client:ro
      - media_files:/app/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - website
      - admin-frontend
      - client-pwa
    restart: always

  # ── Certbot (SSL certificate management) ──────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: always

volumes:
  postgres_data:
  media_files:
  admin_dist:
  client_dist:
  certbot_www:
  certbot_certs:
