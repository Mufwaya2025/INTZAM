version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=intzam_lms
      - POSTGRES_USER=intzam_user
      - POSTGRES_PASSWORD=intzam_password
    restart: always

  backend:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    environment:
      - DEBUG=False
      - SECRET_KEY=generate_something_secure_here
      - DATABASE_URL=postgres://intzam_user:intzam_password@db:5432/intzam_lms
      - ALLOWED_HOSTS=api.yourdomain.com,localhost
      - CORS_ALLOWED_ORIGINS=https://admin.yourdomain.com,https://client.yourdomain.com
    depends_on:
      - db
    restart: always
  
  # For the frontends, we use static servers or serve them directly after build,
  # or even proxy with an Nginx container. Below is an example for serving via Caddy/Nginx in a full stack, 
  # or they can be deployed natively to Vercel/Netlify.

volumes:
  postgres_data:
