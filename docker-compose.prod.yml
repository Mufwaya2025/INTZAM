version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=intzam_lms
      - POSTGRES_USER=intzam_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intzam_user -d intzam_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env.production
    depends_on:
      db:
        condition: service_healthy
    restart: always

  website:
    build: ./website
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn web_project.wsgi:application --bind 0.0.0.0:8001 --workers 2"
    ports:
      - '8001:8001'
    env_file:
      - ./website/.env.production
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
