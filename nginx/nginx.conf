worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Docker internal DNS resolver — resolves upstreams dynamically at request time
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Security headers (applied to all responses) ───────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── HTTP server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name 102.210.102.29;

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/v1/auth/login/ {
            set $backend backend:8000;
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            limit_req          zone=login burst=5 nodelay;
            limit_req_status   429;
        }

        location /api/ {
            set $backend backend:8000;
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

        }

        # ── Django Admin ──────────────────────────────────────────────────────
        location /django-admin/ {
            set $backend backend:8000;
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Website static files (Django CMS — served directly from volume) ────
        location /static/site/ {
            alias /usr/share/nginx/website_static/site/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri $uri/ =404;
        }

        # ── Backend static files (Django admin + DRF — served by backend:8000) ──
        location /static/ {
            set $backend backend:8000;
            proxy_pass http://$backend;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Media files ───────────────────────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Admin Frontend (React SPA) ────────────────────────────────────────
        location = /admin { return 301 /admin/; }
        location = /admin/ {
            alias /usr/share/nginx/admin/;
            try_files index.html =404;
            expires 1h;
            add_header Cache-Control "public";
        }
        location /admin/assets/ {
            alias /usr/share/nginx/admin/assets/;
            try_files $uri =404;
            expires 1h;
            add_header Cache-Control "public";
        }
        location /admin/ {
            return 404;
        }

        # ── Client PWA (React SPA) ────────────────────────────────────────────
        location = /app { return 301 /app/; }
        location = /app/ {
            alias /usr/share/nginx/client/;
            try_files index.html =404;
            expires 1h;
            add_header Cache-Control "public";
        }
        location /app/assets/ {
            alias /usr/share/nginx/client/assets/;
            try_files $uri =404;
            expires 1h;
            add_header Cache-Control "public";
        }
        location = /app/manifest.json {
            alias /usr/share/nginx/client/manifest.json;
            expires 1h;
            add_header Cache-Control "public";
        }
        location = /app/vite.svg {
            alias /usr/share/nginx/client/vite.svg;
            expires 1h;
            add_header Cache-Control "public";
        }
        location /app/ {
            return 404;
        }

        # ── Public Website (Django CMS) ───────────────────────────────────────
        location / {
            set $website website:8001;
            proxy_pass         http://$website;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
}
